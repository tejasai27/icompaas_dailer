services:
  api-gateway:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - orchestrator-api
      - realtime-gateway

  orchestrator-api:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./.env
    command: sh -c "python manage.py migrate && gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4"
    depends_on:
      - postgres
      - redis
      - redpanda

  telephony-adapter:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./.env
    command: sh -c "celery -A config worker -Q telephony --concurrency=8 --loglevel=info"
    depends_on:
      - postgres
      - redis
      - redpanda

  scheduler-worker:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./.env
    command: sh -c "celery -A config worker -Q scheduler --concurrency=4 --loglevel=info"
    depends_on:
      - postgres
      - redis
      - redpanda

  crm-sync-worker:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./.env
    command: sh -c "celery -A config worker -Q crm --concurrency=4 --loglevel=info"
    depends_on:
      - postgres
      - redis
      - redpanda

  realtime-gateway:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./.env
    command: sh -c "gunicorn config.asgi:application -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8001 --workers 2"
    depends_on:
      - redis

  frontend-web:
    build:
      context: ./frontend
    restart: unless-stopped
    command: sh -c "npm ci && npm run build && npm run preview -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PGDATABASE:-icompaas_dialer}
      POSTGRES_USER: ${PGUSER:-icompaas_user}
      POSTGRES_PASSWORD: ${PGPASSWORD:-icompaas_password}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.3.5
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "1G"
      - --reserve-memory
      - "0M"
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"

  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.3.0
    restart: unless-stopped
    ports:
      - "3000:3000"

volumes:
  pg_data:
